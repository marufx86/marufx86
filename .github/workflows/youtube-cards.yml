name: GitHub Readme YouTube Cards
on:
  schedule:
    # Runs every hour
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # CRITICAL: This allows the action to "see" your README.md
      - uses: actions/checkout@v3

      - name: Update YouTube Cards
        uses: DenverCoder1/github-readme-youtube-cards@main
        with:
          channel_id: UCcHH86I2DsD8C2VBzqKty4w
          # Optional: Adjust your layout
          max_videos: 6
          base_url: https://ytcards.demolab.com/

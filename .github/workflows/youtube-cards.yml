name: GitHub Readme YouTube Cards

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - uses: DenverCoder1/github-readme-youtube-cards@main
        with:
          channel_id: UCcHH86I2DsD8C2VBzqKty4w
          max_videos: 6
